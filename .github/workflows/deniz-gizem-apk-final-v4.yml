name: Deniz Gizem APK FINAL V4

on:
  push:
    branches:
      - main
      - master
      - ana
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle 8.7 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Final proje zipini ac
        shell: bash
        run: |
          set -euo pipefail
          test -f deniz_gizem_rotam_android_final_v4.zip
          unzip -q deniz_gizem_rotam_android_final_v4.zip

      - name: Gradle izni ver
        shell: bash
        run: chmod +x deniz_gizem_rotam_android_final_v4/gradlew

      - name: APK olustur
        shell: bash
        run: |
          cd deniz_gizem_rotam_android_final_v4
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: APK dosyasini yukle
        uses: actions/upload-artifact@v4
        with:
          name: DenizGizemRotam-final-v4-apk
          path: deniz_gizem_rotam_android_final_v4/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
